<!DOCTYPE html>
<html>
<head>
    <title>Contoh Tag Atribut HTML</title>
</head>
<body>

<h3>Contoh Penggunaan Tag Bold, Italic, dan Underline</h3>

<p>
    Pada HTML, teks bisa dibuat 
    <b>tebal</b>, 
    <i>miring</i>, 
    <u>bergaris bawah</u>, 
    <b><i>tebal dan miring</i></b>, 
    serta <b><i><u>kombinasi lengkap</u></i></b> 
    tanpa mengganggu teks normal.
</p>

</body>
</html>
